<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인 — GC 교육포털</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',sans-serif;background:#1a2744;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:40px 36px;width:min(400px,94vw);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.logo-icon{width:44px;height:44px;background:#1d4e89;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text h2{font-size:17px;font-weight:700;color:#1a202c}
.logo-text p{font-size:12px;color:#94a3b8;margin-top:2px}
.tab-row{display:flex;gap:0;margin-bottom:24px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.tab-btn{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#f8faff;color:#64748b;border:none;transition:background .15s}
.tab-btn.active{background:#1d4e89;color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .15s}
.form-group input:focus{outline:none;border-color:#1d4e89;box-shadow:0 0 0 3px rgba(29,78,137,.1)}
.btn-login{width:100%;padding:12px;background:#1d4e89;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn-login:hover{opacity:.88}
.error-msg{background:#fee2e2;color:#dc2626;border-radius:6px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.back-link{text-align:center;margin-top:18px}
.back-link a{color:#94a3b8;font-size:13px;text-decoration:none}
.back-link a:hover{color:#1d4e89}
.panel{display:none}
.panel.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔑</div>
    <div class="logo-text">
      <h2>ADMIN PORTAL</h2>
      <p>관리자 로그인</p>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('admin')">🔑 전체 관리자</button>
    <button class="tab-btn" onclick="switchTab('sub')">👤 부관리자</button>
  </div>

  <!-- 전체 관리자 -->
  <div class="panel active" id="panel-admin">
    <div class="form-group">
      <label>관리자 비밀번호</label>
      <input type="password" id="admin-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <button class="btn-login" onclick="adminLogin()">로그인</button>
    <div class="error-msg" id="admin-err">비밀번호가 올바르지 않습니다.</div>
  </div>

  <!-- 부관리자 -->
  <div class="panel" id="panel-sub">
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="sub-id" placeholder="아이디 입력" onkeydown="if(event.key==='Enter')subLogin()">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="sub-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')subLogin()">
    </div>
    <button class="btn-login" onclick="subLogin()">로그인</button>
    <div class="error-msg" id="sub-err">아이디 또는 비밀번호가 올바르지 않습니다.</div>
  </div>

  <div class="back-link"><a href="/index.html">← 처음으로 돌아가기</a></div>
</div>

<script>
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['admin','sub'][i]===t));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', ['admin','sub'][i]===t));
}

async function adminLogin() {
  const pw = document.getElementById('admin-pw').value;
  const errEl = document.getElementById('admin-err');
  errEl.style.display = 'none';
  if (!pw) { errEl.style.display='block'; errEl.textContent='비밀번호를 입력해주세요.'; return; }

  try {
    const res = await fetch('/api/auth/admin', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pw})
    });
    const data = await res.json();
    if (data.ok) {
      const session = {type:'admin', name:'관리자'};
      sessionStorage.setItem('edu_current_user', JSON.stringify(session));
      localStorage.setItem('edu_current_user', JSON.stringify(session));
      const redirect = new URLSearchParams(location.search).get('redirect') || '/admin.html';
const storedRedirect = localStorage.getItem('edu_login_redirect');
if (storedRedirect) {
  localStorage.removeItem('edu_login_redirect');
  location.href = storedRedirect;
  return;
}
location.href = redirect;
    } else {
      errEl.style.display = 'block';
      errEl.textContent = '비밀번호가 올바르지 않습니다.';
    }
  } catch(e) {
    errEl.style.display = 'block';
    errEl.textContent = '서버 연결 오류. 잠시 후 다시 시도해주세요.';
  }
}

async function subLogin() {
  const username = document.getElementById('sub-id').value;
  const password = document.getElementById('sub-pw').value;
  const errEl = document.getElementById('sub-err');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.style.display='block'; errEl.textContent='아이디와 비밀번호를 입력해주세요.'; return; }

  try {
    const res = await fetch('/api/auth/sub-admin', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.ok) {
      const session = {...data.data, type:'sub_admin'};
      sessionStorage.setItem('edu_current_user', JSON.stringify(session));
      localStorage.setItem('edu_current_user', JSON.stringify(session));
      location.href = '/admin.html';
    } else {
      errEl.style.display = 'block';
      errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    }
  } catch(e) {
    errEl.style.display = 'block';
    errEl.textContent = '서버 연결 오류. 잠시 후 다시 시도해주세요.';
  }
}
</script>
</body>
</html>
