<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온보딩 관리 — GC 교육포털</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',sans-serif;background:#f4f6fb;color:#1a202c;font-size:14px}
.header{background:#1d4e89;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:600}
.header .nav a{color:#c8d8f0;text-decoration:none;margin-left:16px;font-size:13px}
.header .nav a:hover{color:#fff}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #e2e8f0}
.tab{padding:10px 20px;cursor:pointer;border-radius:6px 6px 0 0;color:#64748b;font-size:13px;font-weight:500;border:none;background:none}
.tab.active{background:#1d4e89;color:#fff}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:#1d4e89;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s}
.btn-primary{background:#1d4e89;color:#fff}
.btn-success{background:#16a34a;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-outline{background:#fff;color:#1d4e89;border:1px solid #1d4e89}
.btn:hover{opacity:.85}
.btn-sm{padding:5px 11px;font-size:12px}
table{width:100%;border-collapse:collapse}
th{background:#f1f5f9;padding:10px 12px;text-align:left;font-size:12px;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8faff}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:#dbeafe;color:#1e40af}
.badge-done{background:#dcfce7;color:#15803d}
.badge-warn{background:#fef3c7;color:#d97706}
.badge-danger{background:#fee2e2;color:#dc2626}
.progress-bar{background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden}
.progress-fill{background:#1d4e89;height:100%;border-radius:4px;transition:width .3s}
.dday{font-weight:700}
.dday.ok{color:#16a34a}
.dday.warn{color:#d97706}
.dday.danger{color:#dc2626}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:min(680px,95vw);max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;color:#1d4e89;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;line-height:1}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:#64748b;font-weight:600;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit}
.form-row textarea{height:80px;resize:vertical}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#1d4e89;box-shadow:0 0 0 3px rgba(29,78,137,.08)}
.checklist-group{margin-bottom:14px}
.checklist-group-title{font-size:12px;font-weight:700;color:#64748b;background:#f1f5f9;padding:6px 12px;border-radius:6px;margin-bottom:6px}
.checklist-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:4px;background:#fff;cursor:pointer;transition:background .15s}
.checklist-item:hover{background:#f8faff}
.checklist-item.done{background:#f0fdf4;border-color:#bbf7d0}
.checklist-item input[type=checkbox]{width:16px;height:16px;accent-color:#1d4e89;cursor:pointer;flex-shrink:0}
.checklist-item span{flex:1;font-size:13px}
.checklist-item.done span{color:#15803d;text-decoration:line-through}
.checklist-item .done-date{font-size:11px;color:#94a3b8}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#f8faff;border-radius:8px;padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:#1d4e89}
.stat-label{font-size:12px;color:#64748b;margin-top:4px}
.remind-banner{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e}
</style>
</head>
<body>
<div class="header">
  <h1>🏢 GC 교육포털 — 온보딩 관리</h1>
  <div class="nav">
    <a href="/admin.html">← 교육 관리</a>
    <a href="#" onclick="logout()">로그아웃</a>
  </div>
</div>

<div class="container">
  <div id="remind-area"></div>

  <div class="stat-grid" id="stat-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">-</div><div class="stat-label">전체 온보딩</div></div>
    <div class="stat-card"><div class="stat-num" id="s-danger">-</div><div class="stat-label">D-7 이하</div></div>
    <div class="stat-card"><div class="stat-num" id="s-warn">-</div><div class="stat-label">D-20 이하</div></div>
    <div class="stat-card"><div class="stat-num" id="s-incomplete">-</div><div class="stat-label">미완료 항목 있음</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('list')">직원 현황</button>
    <button class="tab" onclick="switchTab('add')">신규 등록</button>
    <button class="tab" onclick="switchTab('resources')">안내자료 관리</button>
    <button class="tab" onclick="switchTab('checklist')">체크리스트 항목</button>
  </div>

  <!-- 직원 현황 탭 -->
  <div class="section active" id="tab-list">
    <div class="card">
      <div class="card-title">
        온보딩 진행 현황
        <button class="btn btn-primary btn-sm" onclick="loadList()">새로고침</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>성명</th><th>사번</th><th>부서/직급</th><th>입사일</th>
            <th>수습 만료</th><th>D-day</th><th>진행률</th><th>고용형태</th><th>관리</th>
          </tr>
        </thead>
        <tbody id="emp-table-body">
          <tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:24px">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 신규 등록 탭 -->
  <div class="section" id="tab-add">
    <div class="card" style="max-width:520px">
      <div class="card-title">신규 입사자 온보딩 등록</div>
      <div class="form-row">
        <label>성명 *</label>
        <input type="text" id="add-emp-name" placeholder="예: 홍길동">
      </div>
      <div class="form-row">
        <label>사번 *</label>
        <input type="text" id="add-emp-id" placeholder="예: 2026001">
      </div>
      <div class="form-row">
        <label>부서</label>
        <input type="text" id="add-emp-dept" placeholder="예: 개발팀">
      </div>
      <div class="form-row">
        <label>직급</label>
        <input type="text" id="add-emp-position" placeholder="예: 사원">
      </div>
      <div class="form-row">
        <label>이메일</label>
        <input type="email" id="add-emp-email" placeholder="예: hong@gcsc.co.kr">
      </div>
      <div class="form-row">
        <label>입사일 *</label>
        <input type="date" id="add-hire-date">
      </div>
      <div class="form-row">
        <label>고용형태</label>
        <select id="add-emp-type">
          <option value="정규직">정규직</option>
          <option value="계약직(3개월)">계약직(3개월)</option>
          <option value="촉탁직">촉탁직</option>
        </select>
      </div>
      <div class="form-row">
        <label>메모</label>
        <textarea id="add-notes" placeholder="특이사항 등"></textarea>
      </div>
      <button class="btn btn-primary" onclick="addEmployee()">등록하기</button>
    </div>
  </div>

  <!-- 안내자료 탭 -->
  <div class="section" id="tab-resources">
    <div class="card">
      <div class="card-title">
        입사 안내자료
        <button class="btn btn-primary btn-sm" onclick="openResourceModal()">+ 자료 추가</button>
      </div>
      <table>
        <thead><tr><th>제목</th><th>유형</th><th>설명</th><th>관리</th></tr></thead>
        <tbody id="resource-body">
          <tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:24px">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 체크리스트 항목 관리 탭 -->
  <div class="section" id="tab-checklist">
    <div class="card">
      <div class="card-title">
        체크리스트 항목 관리
        <button class="btn btn-primary btn-sm" onclick="openItemModal()">+ 항목 추가</button>
      </div>
      <p style="font-size:12px;color:#64748b;margin-bottom:14px">⚠️ 항목 변경은 신규 등록자부터 적용됩니다. 기존 진행 중인 직원에게는 영향을 주지 않습니다.</p>
      <table>
        <thead><tr><th>그룹</th><th>항목명</th><th>순서</th><th>상태</th><th>관리</th></tr></thead>
        <tbody id="item-body">
          <tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 체크리스트 항목 추가/수정 모달 -->
<div class="modal-bg" id="item-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-title">
      <span id="item-modal-title">항목 추가</span>
      <button class="close-btn" onclick="closeItemModal()">×</button>
    </div>
    <div class="form-row">
      <label>그룹명 *</label>
      <select id="item-group">
        <option value="입사 준비">입사 준비</option>
        <option value="입사 서류">입사 서류</option>
        <option value="IT·보안 세팅">IT·보안 세팅</option>
        <option value="교육·안내">교육·안내</option>
        <option value="기타 사항">기타 사항</option>
        <option value="4대보험·급여">4대보험·급여</option>
        <option value="수습 관리">수습 관리</option>
        <option value="수습 종료">수습 종료</option>
      </select>
    </div>
    <div class="form-row">
      <label>항목명 *</label>
      <input type="text" id="item-name" placeholder="예: 사원증 발급">
    </div>
    <div class="form-row">
      <label>순서</label>
      <input type="number" id="item-order" placeholder="예: 10" min="1">
    </div>
    <input type="hidden" id="item-edit-id">
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-primary" onclick="saveItem()">저장</button>
      <button class="btn btn-outline" onclick="closeItemModal()">취소</button>
    </div>
  </div>
</div>

<!-- 체크리스트 모달 -->
<div class="modal-bg" id="checklist-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-emp-name">온보딩 체크리스트</span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-success btn-sm" id="convert-btn" onclick="convertEmployee()">정규직 전환 처리</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<!-- 안내자료 추가 모달 -->
<div class="modal-bg" id="resource-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-title">
      안내자료 추가
      <button class="close-btn" onclick="closeResourceModal()">×</button>
    </div>
    <div class="form-row">
      <label>제목 *</label>
      <input type="text" id="res-title" placeholder="예: 복리후생 안내서">
    </div>
    <div class="form-row">
      <label>유형</label>
      <select id="res-type" onchange="toggleResType()">
        <option value="file">파일</option>
        <option value="link">링크</option>
      </select>
    </div>
    <div id="res-file-area" class="form-row">
      <label>파일 첨부</label>
      <input type="file" id="res-file">
    </div>
    <div id="res-link-area" class="form-row" style="display:none">
      <label>링크 URL</label>
      <input type="url" id="res-link" placeholder="https://...">
    </div>
    <div class="form-row">
      <label>설명</label>
      <textarea id="res-desc" placeholder="자료에 대한 간단한 설명"></textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-primary" onclick="saveResource()">저장</button>
      <button class="btn btn-outline" onclick="closeResourceModal()">취소</button>
    </div>
  </div>
</div>

<script>
// api.js 없이 fetch 직접 사용
async function api(url, options = {}) {
  try {
    const res = await fetch(url, options);
    const data = await res.json();
    return data;
  } catch(e) {
    return { ok: false, message: e.message };
  }
}

let currentOnboardingId = null;
let allEmployees = [];
let checklistItems = [];

async function init() {
  const session = checkSession();
  if (!session) return;
  await Promise.all([loadList(), loadEmployeeSelect(), loadResources(), loadChecklistItems()]);
}

function checkSession() {
  const s = sessionStorage.getItem('edu_current_user') || localStorage.getItem('edu_current_user');
  if (!s) { location.href = '/admin-login.html'; return null; }
  const user = JSON.parse(s);
  if (user.type !== 'admin' && user.type !== 'sub_admin') { location.href = '/admin-login.html'; return null; }
  return user;
}

function logout() {
  sessionStorage.removeItem('edu_current_user');
  localStorage.removeItem('edu_current_user');
  location.href = '/admin-login.html';
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => {
    const tabs = ['list','add','resources','checklist'];
    el.classList.toggle('active', tabs[i] === t);
  });
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'checklist') loadItems();
}

// ── 체크리스트 항목 관리 ─────────────────────────────────
async function loadItems() {
  const res = await api('/api/onboarding/checklist-items');
  if (!res.ok) return;
  const list = res.data;
  const tbody = document.getElementById('item-body');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:24px">등록된 항목이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(item => `<tr>
    <td><span style="background:#f1f5f9;padding:3px 8px;border-radius:4px;font-size:12px">${item.group_name}</span></td>
    <td>${item.item_name}</td>
    <td style="color:#64748b;font-size:12px">${item.sort_order}</td>
    <td><span class="badge ${item.is_active ? 'badge-done' : 'badge-danger'}">${item.is_active ? '활성' : '비활성'}</span></td>
    <td style="display:flex;gap:6px">
      <button class="btn btn-outline btn-sm" onclick="openItemModal(${JSON.stringify(item).replace(/"/g,'&quot;')})">수정</button>
      <button class="btn btn-danger btn-sm" onclick="toggleItem(${item.id},${item.is_active})">${item.is_active ? '비활성화' : '활성화'}</button>
    </td>
  </tr>`).join('');
}

function openItemModal(item) {
  document.getElementById('item-modal-title').textContent = item ? '항목 수정' : '항목 추가';
  document.getElementById('item-edit-id').value = item ? item.id : '';
  document.getElementById('item-group').value = item ? item.group_name : '입사 서류';
  document.getElementById('item-name').value = item ? item.item_name : '';
  document.getElementById('item-order').value = item ? item.sort_order : '';
  document.getElementById('item-modal').classList.add('open');
}

function closeItemModal() {
  document.getElementById('item-modal').classList.remove('open');
}

async function saveItem() {
  const id = document.getElementById('item-edit-id').value;
  const group_name = document.getElementById('item-group').value;
  const item_name  = document.getElementById('item-name').value.trim();
  const sort_order = parseInt(document.getElementById('item-order').value) || 0;
  if (!item_name) { alert('항목명을 입력해주세요'); return; }

  if (id) {
    // 수정 — 직접 D1에 API 없으므로 일단 새로 추가 후 기존 비활성화
    await api('/api/onboarding/checklist-items/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ group_name, item_name, sort_order })
    });
  } else {
    await api('/api/onboarding/checklist-items', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ group_name, item_name, sort_order })
    });
  }
  closeItemModal();
  loadItems();
}

async function toggleItem(id, isActive) {
  if (!confirm(isActive ? '이 항목을 비활성화하시겠습니까?' : '이 항목을 활성화하시겠습니까?')) return;
  await api('/api/onboarding/checklist-items/' + id + '/toggle', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ is_active: isActive ? 0 : 1 })
  });
  loadItems();
}

async function loadChecklistItems() {
  const res = await api('/api/onboarding/checklist-items');
  if (res.ok) checklistItems = res.data;
}

async function loadList() {
  const res = await api('/api/onboarding/employees');
  if (!res.ok) return;
  const list = res.data;

  // 통계
  document.getElementById('s-total').textContent = list.length;
  document.getElementById('s-danger').textContent = list.filter(e => e.dday <= 7 && e.dday >= 0).length;
  document.getElementById('s-warn').textContent = list.filter(e => e.dday <= 20 && e.dday >= 0).length;
  document.getElementById('s-incomplete').textContent = list.filter(e => e.done_items < e.total_items).length;

  // D-20 리마인드 배너
  const reminders = list.filter(e => e.dday === 20);
  const area = document.getElementById('remind-area');
  area.innerHTML = reminders.map(e =>
    `<div class="remind-banner">⏰ <strong>${e.name}</strong> 님 수습 만료 20일 전입니다. 평가 일정을 잡아주세요.</div>`
  ).join('');

  const tbody = document.getElementById('emp-table-body');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:24px">등록된 온보딩 직원이 없습니다</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(e => {
    const pct = e.total_items ? Math.round(e.done_items / e.total_items * 100) : 0;
    let ddayClass = 'ok', ddayLabel = 'D-' + e.dday;
    if (e.dday < 0) { ddayClass = 'danger'; ddayLabel = 'D+' + Math.abs(e.dday); }
    else if (e.dday <= 7) ddayClass = 'danger';
    else if (e.dday <= 20) ddayClass = 'warn';
    return `<tr>
      <td><strong>${e.name}</strong></td>
      <td style="font-family:monospace;font-size:12px;color:#64748b">${e.emp_id}</td>
      <td>${e.department||'-'} / ${e.position}</td>
      <td>${e.hire_date}</td>
      <td>${e.probation_end}</td>
      <td><span class="dday ${ddayClass}">${ddayLabel}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-bar" style="flex:1;min-width:60px">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <span style="font-size:11px;color:#64748b;min-width:32px">${pct}%</span>
        </div>
      </td>
      <td><span class="badge badge-active">${e.emp_type}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openChecklist(${e.id},'${e.name}')">체크리스트</button>
      </td>
    </tr>`;
  }).join('');
}

}

async function addEmployee() {
  const name      = document.getElementById('add-emp-name').value.trim();
  const emp_id    = document.getElementById('add-emp-id').value.trim();
  const dept      = document.getElementById('add-emp-dept').value.trim();
  const position  = document.getElementById('add-emp-position').value.trim();
  const email     = document.getElementById('add-emp-email').value.trim();
  const hire_date = document.getElementById('add-hire-date').value;
  const emp_type  = document.getElementById('add-emp-type').value;
  const notes     = document.getElementById('add-notes').value;

  if (!name || !emp_id || !hire_date) { alert('성명, 사번, 입사일은 필수입니다'); return; }

  const res = await api('/api/onboarding/employees', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, emp_id, dept, position, email, hire_date, emp_type, notes })
  });
  if (res.ok) {
    alert('등록 완료! 수습 만료일: ' + res.data.probation_end);
    ['add-emp-name','add-emp-id','add-emp-dept','add-emp-position','add-emp-email','add-hire-date','add-notes'].forEach(id => {
      document.getElementById(id).value = '';
    });
    switchTab('list');
    loadList();
  } else {
    alert('등록 실패: ' + (res.message || '오류'));
  }
}

async function openChecklist(onboardingId, name) {
  currentOnboardingId = onboardingId;
  document.getElementById('modal-emp-name').textContent = name + ' — 온보딩 체크리스트';
  document.getElementById('checklist-modal').classList.add('open');

  const res = await api('/api/onboarding/employees/' + onboardingId);
  if (!res.ok) return;
  const data = res.data;
  const progress = data.progress || [];

  const groups = {};
  progress.forEach(p => {
    if (!groups[p.group_name]) groups[p.group_name] = [];
    groups[p.group_name].push(p);
  });

  let html = '';
  for (const [group, items] of Object.entries(groups)) {
    const done = items.filter(i => i.is_done).length;
    html += `<div class="checklist-group">
      <div class="checklist-group-title">${group} (${done}/${items.length})</div>`;
    items.forEach(item => {
      html += `<div class="checklist-item ${item.is_done ? 'done' : ''}" id="ci-${item.item_id}">
        <input type="checkbox" ${item.is_done ? 'checked' : ''}
          onchange="toggleItem(${item.item_id}, this.checked)">
        <span>${item.item_name}</span>
        ${item.done_at ? '<span class="done-date">' + item.done_at + '</span>' : ''}
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('modal-body').innerHTML = html;
}

async function toggleItem(itemId, isDone) {
  await api('/api/onboarding/progress/' + currentOnboardingId + '/' + itemId, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ is_done: isDone })
  });
  const el = document.getElementById('ci-' + itemId);
  if (el) el.classList.toggle('done', isDone);
  loadList();
}

async function convertEmployee() {
  if (!confirm('정규직 전환 처리하시겠습니까?')) return;
  const res = await api('/api/onboarding/employees/' + currentOnboardingId + '/convert', {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: '{}'
  });
  if (res.ok) {
    alert('전환 처리 완료!');
    closeModal();
    loadList();
  }
}

function closeModal() {
  document.getElementById('checklist-modal').classList.remove('open');
  currentOnboardingId = null;
}

async function loadResources() {
  const res = await api('/api/onboarding/resources');
  if (!res.ok) return;
  const list = res.data;
  const tbody = document.getElementById('resource-body');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:24px">등록된 자료가 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><strong>${r.title}</strong></td>
    <td><span class="badge ${r.resource_type === 'file' ? 'badge-active' : 'badge-done'}">${r.resource_type === 'file' ? '파일' : '링크'}</span></td>
    <td style="color:#64748b">${r.description || '-'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteResource(${r.id})">삭제</button></td>
  </tr>`).join('');
}

function openResourceModal() {
  document.getElementById('resource-modal').classList.add('open');
}
function closeResourceModal() {
  document.getElementById('resource-modal').classList.remove('open');
}
function toggleResType() {
  const t = document.getElementById('res-type').value;
  document.getElementById('res-file-area').style.display = t === 'file' ? '' : 'none';
  document.getElementById('res-link-area').style.display = t === 'link' ? '' : 'none';
}

async function saveResource() {
  const title = document.getElementById('res-title').value.trim();
  const type  = document.getElementById('res-type').value;
  const desc  = document.getElementById('res-desc').value.trim();
  if (!title) { alert('제목을 입력해주세요'); return; }

  let file_name = '', file_data = '', link_url = '';
  if (type === 'file') {
    const file = document.getElementById('res-file').files[0];
    if (file) {
      file_name = file.name;
      file_data = await toBase64(file);
    }
  } else {
    link_url = document.getElementById('res-link').value.trim();
  }

  const res = await api('/api/onboarding/resources', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, resource_type: type, file_name, file_data, link_url, description: desc })
  });
  if (res.ok) {
    closeResourceModal();
    loadResources();
    document.getElementById('res-title').value = '';
    document.getElementById('res-desc').value = '';
  }
}

function toBase64(file) {
  return new Promise(r => {
    const reader = new FileReader();
    reader.onload = e => r(e.target.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

async function deleteResource(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await api('/api/onboarding/resources/' + id, { method: 'DELETE' });
  loadResources();
}

init();
</script>
