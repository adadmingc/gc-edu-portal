<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입사자 온보딩 — GC 교육포털</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',sans-serif;background:#f4f6fb;color:#1a202c;font-size:14px}
.header{background:linear-gradient(90deg,#0f6e56,#1d4e89);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:600}
.header .nav a{color:#a7f3d0;text-decoration:none;margin-left:16px;font-size:13px}
.container{max-width:900px;margin:0 auto;padding:24px 20px}
.welcome-card{background:linear-gradient(135deg,#1d4e89,#0f6e56);color:#fff;border-radius:12px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.welcome-card::after{content:'🌱';position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.15}
.welcome-card h2{font-size:20px;font-weight:700;margin-bottom:6px}
.welcome-card p{font-size:13px;opacity:.85;line-height:1.6}
.welcome-meta{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.welcome-meta span{background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;font-size:12px}
.section-title{font-size:15px;font-weight:700;color:#1d4e89;margin:20px 0 12px}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.prog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:16px}
.prog-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;text-align:center}
.prog-num{font-size:22px;font-weight:700;color:#1d4e89}
.prog-label{font-size:11px;color:#64748b;margin-top:3px}
.big-bar{background:#e2e8f0;border-radius:8px;height:12px;overflow:hidden;margin-bottom:6px}
.big-fill{background:linear-gradient(90deg,#1d4e89,#0f6e56);height:100%;border-radius:8px;transition:width .4s}
.group-title{font-size:12px;font-weight:700;color:#64748b;background:#f1f5f9;padding:7px 12px;border-radius:6px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.checklist-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid #e2e8f0;border-radius:6px;margin-bottom:4px;background:#fff}
.checklist-item.done{background:#f0fdf4;border-color:#bbf7d0}
.check-icon{width:20px;height:20px;border-radius:50%;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.check-icon.done{background:#16a34a;border-color:#16a34a;color:#fff}
.checklist-item span{flex:1;font-size:13px}
.checklist-item.done span{color:#15803d}
.done-date{font-size:11px;color:#94a3b8;white-space:nowrap}
.tl-wrap{position:relative;padding-left:20px}
.tl-wrap::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:#e2e8f0}
.tl-item{position:relative;padding-left:18px;margin-bottom:18px}
.tl-dot{position:absolute;left:-14px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid #1d4e89;background:#fff}
.tl-dot.done{background:#16a34a;border-color:#16a34a}
.tl-date{font-size:11px;color:#94a3b8;margin-bottom:2px}
.tl-label{font-size:13px;font-weight:600}
.tl-desc{font-size:12px;color:#64748b;margin-top:2px}
.resource-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:8px;background:#fff;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit}
.resource-item:hover{background:#f8faff;border-color:#bfdbfe}
.res-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:#dcfce7;color:#15803d}
.badge-warn{background:#fef3c7;color:#d97706}
.badge-danger{background:#fee2e2;color:#dc2626}
.alert-box{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#92400e}
.notice-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#15803d}
.edu-btn{display:inline-flex;align-items:center;gap:8px;background:#1d4e89;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="header">
  <h1>🌱 입사자 온보딩</h1>
  <div class="nav">
    <a href="/employee.html">← 교육 포털</a>
    <a href="#" onclick="logout()">로그아웃</a>
  </div>
</div>
<div class="container" id="main"></div>
<script>
async function init() {
  var s = JSON.parse(sessionStorage.getItem('edu_current_user') || localStorage.getItem('edu_current_user') || 'null');
  if (!s) { location.href = '/employee-login.html'; return; }
  var empId = s.emp_id || s.empId || (s.emp && (s.emp.emp_id || s.emp.empId));
  var empName = s.name || (s.emp && s.emp.name) || '직원';

  var r1 = await fetch('/api/onboarding/employees').then(function(r){return r.json();});
  var r2 = await fetch('/api/onboarding/resources').then(function(r){return r.json();});
  var list = r1.ok ? r1.data : [];
  var resources = r2.ok ? r2.data : [];
  var me = list.find(function(e){return e.emp_id === empId;});

  if (!me) {
    document.getElementById('main').innerHTML =
      '<div class="welcome-card"><h2>안녕하세요, ' + empName + '님! 👋</h2>' +
      '<p>온보딩 정보가 등록되지 않았습니다.<br>HR 담당자에게 문의해 주세요.</p></div>' +
      buildResources(resources);
    return;
  }

  var r3 = await fetch('/api/onboarding/employees/' + me.id).then(function(r){return r.json();});
  var progress = r3.ok ? (r3.data.progress || []) : [];
  var total = progress.length;
  var done  = progress.filter(function(p){return p.is_done;}).length;
  var pct   = total ? Math.round(done/total*100) : 0;
  var dday  = me.dday;
  var ddayBadge = dday < 0
    ? '<span class="badge badge-danger">D+' + Math.abs(dday) + '</span>'
    : dday <= 7 ? '<span class="badge badge-danger">D-' + dday + '</span>'
    : dday <= 20 ? '<span class="badge badge-warn">D-' + dday + '</span>'
    : '<span class="badge badge-ok">D-' + dday + '</span>';

  var groups = {};
  progress.forEach(function(p){ if(!groups[p.group_name])groups[p.group_name]=[]; groups[p.group_name].push(p); });
  var clHtml = '';
  Object.keys(groups).forEach(function(g) {
    var items = groups[g];
    var gd = items.filter(function(i){return i.is_done;}).length;
    clHtml += '<div class="group-title">' + g + '<span>' + gd + '/' + items.length + '</span></div>';
    items.forEach(function(item) {
      clHtml += '<div class="checklist-item' + (item.is_done?' done':'') + '">' +
        '<div class="check-icon' + (item.is_done?' done':'') + '">' + (item.is_done?'✓':'') + '</div>' +
        '<span>' + item.item_name + '</span>' +
        (item.done_at ? '<span class="done-date">' + item.done_at + '</span>' : '') + '</div>';
    });
  });

  var probEnd  = me.probation_end;
  var evalD    = new Date(probEnd); evalD.setDate(evalD.getDate()-20);
  var evalStr  = evalD.toISOString().slice(0,10);
  var todayStr = new Date().toISOString().slice(0,10);

  document.getElementById('main').innerHTML =
    '<div class="welcome-card">' +
    '<h2>안녕하세요, ' + (me.name||empName) + '님! 🎉</h2>' +
    '<p>GC 입사를 환영합니다. 아래에서 온보딩 진행 현황을 확인하세요.<br>' +
    '<small style="opacity:.7">각 항목은 HR 담당자가 처리 완료 시 체크됩니다.</small></p>' +
    '<div class="welcome-meta">' +
    '<span>📅 입사일: ' + me.hire_date + '</span>' +
    '<span>⏳ 수습 만료: ' + probEnd + ' ' + ddayBadge + '</span>' +
    '<span>💼 ' + me.emp_type + '</span></div></div>' +

    (dday<=20&&dday>=0 ? '<div class="alert-box">⚠️ 수습 만료까지 <strong>' + dday + '일</strong> 남았습니다.</div>' : '') +
    (pct===100 ? '<div class="notice-box">✅ 모든 온보딩 항목이 완료되었습니다! 수고하셨습니다.</div>' : '') +

    '<div class="prog-grid">' +
    '<div class="prog-card"><div class="prog-num">' + total + '</div><div class="prog-label">전체</div></div>' +
    '<div class="prog-card"><div class="prog-num" style="color:#16a34a">' + done + '</div><div class="prog-label">완료</div></div>' +
    '<div class="prog-card"><div class="prog-num" style="color:#dc2626">' + (total-done) + '</div><div class="prog-label">미완료</div></div>' +
    '<div class="prog-card"><div class="prog-num">' + pct + '%</div><div class="prog-label">진행률</div></div>' +
    '</div>' +
    '<div class="big-bar"><div class="big-fill" style="width:' + pct + '%"></div></div>' +
    '<p style="font-size:12px;color:#94a3b8;text-align:right;margin-bottom:20px">HR 담당자가 처리 완료한 항목이 자동으로 체크됩니다</p>' +

    '<div class="section-title">📋 온보딩 체크리스트</div>' +
    '<div class="card">' + clHtml + '</div>' +

    '<div class="section-title">📅 주요 일정</div>' +
    '<div class="card"><div class="tl-wrap">' +
    '<div class="tl-item"><div class="tl-dot done"></div><div class="tl-date">' + me.hire_date + '</div><div class="tl-label">입사일</div><div class="tl-desc">온보딩 절차 시작</div></div>' +
    '<div class="tl-item"><div class="tl-dot' + (todayStr>=evalStr?' done':'') + '"></div><div class="tl-date">' + evalStr + '</div><div class="tl-label">수습 평가 (만료 20일 전)</div><div class="tl-desc">평가서 수령 및 제출</div></div>' +
    '<div class="tl-item"><div class="tl-dot' + (me.status==='converted'?' done':'') + '"></div><div class="tl-date">' + probEnd + '</div><div class="tl-label">수습 만료 / 정규직 전환</div><div class="tl-desc">정규직 근로계약서 체결</div></div>' +
    '</div></div>' +

    buildResources(resources);
}

function buildResources(resources) {
  var items = resources.length
    ? resources.map(function(r) {
        var isFile = r.resource_type==='file';
        return '<a class="resource-item" href="' + (isFile?'#':r.link_url) + '" ' +
          (isFile?'':'target="_blank"') + ' ' +
          (isFile?'onclick="dlRes(event,'+r.id+',\''+r.file_name+'\')"':'') + '>' +
          '<div class="res-icon" style="background:' + (isFile?'#dbeafe':'#dcfce7') + '">' + (isFile?'📄':'🔗') + '</div>' +
          '<div><div style="font-size:13px;font-weight:600">' + r.title + '</div>' +
          (r.description?'<div style="font-size:11px;color:#64748b;margin-top:2px">'+r.description+'</div>':'') +
          '</div></a>';
      }).join('')
    : '<p style="color:#94a3b8;font-size:13px;text-align:center;padding:12px 0">등록된 안내자료가 없습니다.</p>';

  return '<div class="section-title">📁 입사 안내자료</div><div class="card">' + items + '</div>' +
    '<div class="section-title">🎓 입사자 교육</div>' +
    '<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">' +
    '<div><div style="font-size:14px;font-weight:600;margin-bottom:4px">GC 교육포털에서 입사자 교육을 수강하세요</div>' +
    '<div style="font-size:12px;color:#64748b">입사자 필수 교육 영상 및 자료를 확인할 수 있습니다</div></div>' +
    '<a href="/employee.html" class="edu-btn">교육 포털 바로가기 →</a></div>';
}

async function dlRes(e, id, fileName) {
  e.preventDefault();
  var r = await fetch('/api/onboarding/resources/'+id+'/download').then(function(x){return x.json();});
  if (!r.ok) { alert('다운로드 실패'); return; }
  var a = document.createElement('a');
  a.href = 'data:application/octet-stream;base64,' + r.data.file_data;
  a.download = fileName; a.click();
}

function logout() {
  sessionStorage.removeItem('edu_current_user');
  localStorage.removeItem('edu_current_user');
  location.href = '/employee-login.html';
}

init();
</script>
</body>
</html>
